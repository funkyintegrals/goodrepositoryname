<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archive</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#241a3a,#0f0b18);
  font-family:monospace;
  color:white;
  overflow:hidden;
}

.topbar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  display:flex;
  gap:8px;
  align-items:center;
}

.topbar button{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.status{
  font-size:12px;
  opacity:0.8;
}

.app{
  width:920px;
  height:540px;
  margin:60px auto;
  display:none;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  backdrop-filter:blur(18px);
  overflow:hidden;
}

.sidebar{
  width:220px;
  padding:12px;
  background:rgba(255,255,255,0.04);
  border-right:1px solid rgba(255,255,255,0.08);
}

.chapter{
  padding:8px;
  margin-bottom:6px;
  border-radius:8px;
  cursor:pointer;
}

.chapter:hover{
  background:rgba(255,255,255,0.08);
}

.content{
  flex:1;
  padding:18px;
  display:flex;
  flex-direction:column;
}

.title{
  font-size:18px;
  margin-bottom:10px;
}

.readonly{
  flex:1;
  white-space:pre-wrap;
}

.hidden{
  display:none;
}

#modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  z-index:10000;
}

.panel{
  width:320px;
  padding:16px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
}

.panel input{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  border-radius:8px;
}

button{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="openLogin">Login</button>
  <span class="status" id="status">Not logged in</span>
  <button id="editBtn" class="hidden">Edit</button>
</div>

<div id="modal">
  <div class="panel">
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button id="loginBtn">Login</button>
    <button id="closeModal">Close</button>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="title" id="title">...</div>
    <div class="readonly" id="reader">...</div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAYxM0lgqwhy3cGjUyCqezNrZGXlt9k4VQ",
  authDomain: "before-funkyintegrals.firebaseapp.com",
  projectId: "before-funkyintegrals",
  storageBucket: "before-funkyintegrals.firebasestorage.app",
  messagingSenderId: "417148050533",
  appId: "1:417148050533:web:c6e8b7c0de0495a7ea3a8c"
};

const ADMIN_UID = "YOUR_UID_HERE";

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

const openLogin = document.getElementById("openLogin");
const modal = document.getElementById("modal");
const closeModal = document.getElementById("closeModal");
const loginBtn = document.getElementById("loginBtn");

const email = document.getElementById("email");
const password = document.getElementById("password");

const status = document.getElementById("status");
const editBtn = document.getElementById("editBtn");

const appUI = document.getElementById("app");
const sidebar = document.getElementById("sidebar");
const title = document.getElementById("title");
const reader = document.getElementById("reader");

const locked = {
  title:"...",
  text:"Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη."
};

let user = null;

function renderLocked(){
  sidebar.innerHTML = "";

  const c = document.createElement("div");
  c.className = "chapter";
  c.innerText = locked.title;

  c.onclick = () => {
    title.innerText = locked.title;
    reader.innerText = locked.text;
  };

  sidebar.appendChild(c);

  title.innerText = locked.title;
  reader.innerText = locked.text;
}

async function loadChapters(){
  sidebar.innerHTML = "";

  const snap = await getDocs(collection(db,"chapters"));

  snap.forEach(d=>{
    const c = document.createElement("div");
    c.className = "chapter";
    c.innerText = d.data().title;

    c.onclick = async ()=>{
      const data = (await getDoc(doc(db,"chapters",d.id))).data();
      title.innerText = data.title;
      reader.innerText = data.text;
    };

    sidebar.appendChild(c);
  });
}

function renderState(u){
  user = u;

  if(!u){
    status.innerText = "Not logged in";
    editBtn.classList.add("hidden");
    appUI.style.display = "flex";
    renderLocked();
    return;
  }

  status.innerText = "Logged in";

  if(u.uid === ADMIN_UID){
    editBtn.classList.remove("hidden");
  }else{
    editBtn.classList.add("hidden");
  }

  appUI.style.display = "flex";
  loadChapters();
}

openLogin.onclick = ()=> modal.style.display = "flex";
closeModal.onclick = ()=> modal.style.display = "none";

loginBtn.onclick = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  modal.style.display = "none";
};

onAuthStateChanged(auth, u=>{
  renderState(u);
});

renderState(null);

</script>

</body>
</html>
