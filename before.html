<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1e1233, #090514);
  font-family: monospace;
  color: #ffffff;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 9999;
  display: flex;
  gap: 12px;
  align-items: center;
}

.topbar button, .panel button, .editor-controls button {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: monospace;
  transition: background 0.2s, border-color 0.2s;
}

.topbar button:hover, .panel button:hover, .editor-controls button:hover {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.3);
}

.index-btn {
  position: fixed;
  bottom: 15px;
  left: 15px;
  z-index: 9999;

  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: monospace;

  transition: background 0.2s, border-color 0.2s;
}

.index-btn:hover {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.3);
}

.status {
  font-size: 12px;
  letter-spacing: 0.5px;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}

.app {
  width: 960px;
  height: 580px;
  margin: auto;
  display: flex;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.sidebar {
  width: 260px;
  padding: 16px;
  background: rgba(0, 0, 0, 0.2);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  overflow-y: auto;
}

.chapter {
  padding: 10px 14px;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.1);
}

.chapter.active {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.2);
  text-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
}

/* Added helper styles for drag feedback */
.chapter.draggable {
  cursor: grab;
}

.chapter.dragging {
  opacity: 0.4;
  border: 1px dashed rgba(255, 255, 255, 0.3);
}

.content {
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  padding-bottom: 12px;
  letter-spacing: 0.5px;
}

.viewport {
  flex: 1;
  overflow-y: auto;
  position: relative;
  display: flex;
  flex-direction: column;
}

.readonly {
  flex: 1;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 14px;
  color: #dddddd;
}

.editor-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: 12px;
}

.editor-pane input {
  width: 100%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  padding: 10px;
  border-radius: 6px;
  font-family: monospace;
  font-size: 16px;
}

.editor-pane textarea {
  width: 100%;
  flex: 1;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  padding: 12px;
  border-radius: 6px;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
}

.editor-pane input:focus, .editor-pane textarea:focus, .panel input:focus {
  outline: none;
  border-color: rgba(255, 255, 255, 0.35);
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
}

.editor-controls {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  align-items: center;
}

.autosave-log {
  margin-right: auto;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.4);
}

#modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10000;
}

.panel {
  width: 340px;
  padding: 24px;
  border-radius: 14px;
  background: rgba(20, 15, 35, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.18);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel h3 {
  margin: 0 0 6px 0;
  font-size: 16px;
  letter-spacing: 1px;
  text-align: center;
  text-transform: uppercase;
}

.panel input {
  width: 100%;
  padding: 10px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #ffffff;
  border-radius: 6px;
  font-family: monospace;
}

.panel-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.panel-row button {
  flex: 1;
}

.hidden {
  display: none !important;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="authActionBtn">Login</button>
  <span class="status" id="status">Not logged in</span>
  <button id="editBtn" class="hidden">Edit</button>
</div>

<button id="indexBtn" class="index-btn">Back to index</button>

<div id="modal">
  <div class="panel">
    <h3>Authentication</h3>
    <input id="email" type="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <div class="panel-row">
      <button id="loginBtn">Login</button>
      <button id="closeModal">Close</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="viewport" id="viewMode">
      <div class="title" id="title">...</div>
      <div class="readonly" id="reader">...</div>
    </div>
    <div class="viewport hidden" id="editMode">
      <div class="editor-pane">
        <input id="editTitle" type="text" placeholder="Chapter Title">
        <textarea id="editText" placeholder="Chapter content..."></textarea>
        <div class="editor-controls">
          <span id="autosaveLog" class="autosave-log"></span>
          <button id="newBtn">New</button>
          <button id="saveBtn">Save</button>
          <button id="cancelBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  addDoc,
  updateDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAYxM0lgqwhy3cGjUyCqezNrZGXlt9k4VQ",
  authDomain: "before-funkyintegrals.firebaseapp.com",
  projectId: "before-funkyintegrals",
  storageBucket: "before-funkyintegrals.firebasestorage.app",
  messagingSenderId: "417148050533",
  appId: "1:417148050533:web:c6e8b7c0de0495a7ea3a8c"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

const authActionBtn = document.getElementById("authActionBtn");
const modal = document.getElementById("modal");
const closeModal = document.getElementById("closeModal");
const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const status = document.getElementById("status");
const editBtn = document.getElementById("editBtn");

const sidebar = document.getElementById("sidebar");
const viewMode = document.getElementById("viewMode");
const editMode = document.getElementById("editMode");

const titleDisplay = document.getElementById("title");
const readerDisplay = document.getElementById("reader");

const editTitleInput = document.getElementById("editTitle");
const editTextWindow = document.getElementById("editText");
const newBtn = document.getElementById("newBtn");
const saveBtn = document.getElementById("saveBtn");
const cancelBtn = document.getElementById("cancelBtn");
const indexBtn = document.getElementById("indexBtn");
const autosaveLog = document.getElementById("autosaveLog");

const lockedData = {
  title: "...",
  text: "Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη."
};

let currentUser = null;
let activeChapters = [];
let selectedChapterId = null;

// Track edit state and background timers safely
let isEditing = false;
let autoSaveIntervalId = null;

function renderGuestMode() {
  stopAutosaveCycle();
  isEditing = false;
  sidebar.innerHTML = "";
  editBtn.classList.add("hidden");
  editMode.classList.add("hidden");
  viewMode.classList.remove("hidden");

  const fallbackItem = document.createElement("div");
  fallbackItem.className = "chapter active";
  fallbackItem.innerText = lockedData.title;
  
  fallbackItem.onclick = () => {
    titleDisplay.innerText = lockedData.title;
    readerDisplay.innerText = lockedData.text;
  };
  
  sidebar.appendChild(fallbackItem);
  titleDisplay.innerText = lockedData.title;
  readerDisplay.innerText = lockedData.text;
}

async function renderAppMode() {
  stopAutosaveCycle();
  isEditing = false;
  editMode.classList.add("hidden");
  viewMode.classList.remove("hidden");
  
  editBtn.classList.remove("hidden");

  await loadChaptersFromFirestore();
}

async function loadChaptersFromFirestore() {
  try {
    sidebar.innerHTML = "";
    activeChapters = [];
    const chaptersCollection = collection(db, "chapters"); 
    const orderedQuery = query(chaptersCollection, orderBy("order", "asc"));
    
    const snap = await getDocs(orderedQuery);
    
    snap.forEach(docObj => {
      activeChapters.push({
        id: docObj.id,
        ...docObj.data()
      });
    });

    if (activeChapters.length === 0) {
      titleDisplay.innerText = "No chapters found";
      readerDisplay.innerText = "The archive is currently empty.";
      return;
    }

    buildSidebarElements();

    if (selectedChapterId && activeChapters.some(c => c.id === selectedChapterId)) {
      selectChapter(selectedChapterId);
    } else {
      selectChapter(activeChapters[0].id);
    }

  } catch (err) {
    titleDisplay.innerText = "Error Loading Archive";
    readerDisplay.innerText = "Could not fetch resources from database: " + err.message;
  }
}

// Dedicated UI renderer for matching chapter DOM list structure with current mode
function buildSidebarElements() {
  sidebar.innerHTML = "";
  activeChapters.forEach(chapter => {
    const item = document.createElement("div");
    item.className = "chapter";
    item.innerText = chapter.title;
    item.setAttribute("data-id", chapter.id);

    // Apply drag mechanics natively only when user is in editor panel mode
    if (isEditing) {
      item.classList.add("draggable");
      item.setAttribute("draggable", "true");
      attachDragDropListeners(item);
    }

    item.onclick = () => {
      selectChapter(chapter.id);
    };

    sidebar.appendChild(item);
  });
}

function selectChapter(id) {
  selectedChapterId = id;
  const target = activeChapters.find(c => c.id === id);
  
  document.querySelectorAll(".sidebar .chapter").forEach(el => {
    if (el.getAttribute("data-id") === id) {
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  });

  if (target) {
    titleDisplay.innerText = target.title;
    readerDisplay.innerText = target.text;
    
    editTitleInput.value = target.title;
    editTextWindow.value = target.text;
  }
}

/* NATIVE DRAG AND DROP HANDLING logic */
function attachDragDropListeners(element) {
  element.addEventListener("dragstart", (e) => {
    element.classList.add("dragging");
    e.dataTransfer.setData("text/plain", element.getAttribute("data-id"));
  });

  element.addEventListener("dragend", () => {
    element.classList.remove("dragging");
  });

  element.addEventListener("dragover", (e) => {
    e.preventDefault();
    const currentDragging = document.querySelector(".dragging");
    const structuralSiblings = [...sidebar.querySelectorAll(".chapter:not(.dragging)")];
    
    const referenceNextSibling = structuralSiblings.find(sibling => {
      return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
    });
    
    sidebar.insertBefore(currentDragging, referenceNextSibling);
  });

  element.addEventListener("drop", async (e) => {
    e.preventDefault();
    await synchronizeDraggedSequence();
  });
}

async function synchronizeDraggedSequence() {
  const adjustedDomNodes = [...sidebar.querySelectorAll(".chapter")];
  const sequentialChaptersList = [];
  
  if (autosaveLog) autosaveLog.innerText = "Reordering index...";

  for (let idx = 0; idx < adjustedDomNodes.length; idx++) {
    const docId = adjustedDomNodes[idx].getAttribute("data-id");
    const internalMatch = activeChapters.find(c => c.id === docId);
    if (internalMatch) {
      internalMatch.order = idx;
      sequentialChaptersList.push(internalMatch);
      try {
        const docRef = doc(db, "chapters", docId);
        await updateDoc(docRef, { order: idx });
      } catch (dbErr) {
        console.error("Order index sync problem:", dbErr);
      }
    }
  }
  activeChapters = sequentialChaptersList.sort((left, right) => left.order - right.order);
  if (autosaveLog) {
    autosaveLog.innerText = "Order synced.";
    setTimeout(() => { if (isEditing) autosaveLog.innerText = ""; }, 2500);
  }
}

/* AUTOSAVE BACKGROUND ACTIONS ENGINE */
function launchAutosaveCycle() {
  stopAutosaveCycle();
  autoSaveIntervalId = setInterval(async () => {
    if (!currentUser || !selectedChapterId || !isEditing) return;
    
    const prospectiveTitle = editTitleInput.value.trim();
    const prospectiveText = editTextWindow.value;
    
    if (!prospectiveTitle) return;

    const currentCachedChapter = activeChapters.find(c => c.id === selectedChapterId);
    if (currentCachedChapter && (currentCachedChapter.title !== prospectiveTitle || currentCachedChapter.text !== prospectiveText)) {
      if (autosaveLog) autosaveLog.innerText = "Autosaving modifications...";
      try {
        const docRef = doc(db, "chapters", selectedChapterId);
        await updateDoc(docRef, {
          title: prospectiveTitle,
          text: prospectiveText
        });
        currentCachedChapter.title = prospectiveTitle;
        currentCachedChapter.text = prospectiveText;
        
        const existingNode = sidebar.querySelector(`[data-id="${selectedChapterId}"]`);
        if (existingNode) existingNode.innerText = prospectiveTitle;
        
        if (autosaveLog) autosaveLog.innerText = "Autosaved at " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      } catch (err) {
        if (autosaveLog) autosaveLog.innerText = "Autosave suspended (Privilege restrictions)";
      }
    }
  }, 60000);
}

function stopAutosaveCycle() {
  if (autoSaveIntervalId) {
    clearInterval(autoSaveIntervalId);
    autoSaveIntervalId = null;
  }
  if (autosaveLog) autosaveLog.innerText = "";
}

authActionBtn.onclick = async () => {
  if (currentUser) {
    try {
      await signOut(auth);
    } catch (err) {
      alert("Error logging out: " + err.message);
    }
  } else {
    emailInput.value = "";
    passwordInput.value = "";
    modal.style.display = "flex";
  }
};

closeModal.onclick = () => {
  modal.style.display = "none";
};

loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    modal.style.display = "none";
  } catch (err) {
    alert("Authentication failed: " + err.message);
  }
};

editBtn.onclick = () => {
  if (!currentUser || !selectedChapterId) return;
  isEditing = true;
  viewMode.classList.add("hidden");
  editMode.classList.remove("hidden");
  buildSidebarElements();
  selectChapter(selectedChapterId);
  launchAutosaveCycle();
};

cancelBtn.onclick = () => {
  isEditing = false;
  stopAutosaveCycle();
  editMode.classList.add("hidden");
  viewMode.classList.remove("hidden");
  buildSidebarElements();
  if (selectedChapterId) {
    selectChapter(selectedChapterId);
  }
};

newBtn.onclick = async () => {
  if (!currentUser) return;
  
  const configuredTitle = prompt("Enter new chapter title:");
  if (!configuredTitle || !configuredTitle.trim()) return;

  const currentMaxOrdinal = activeChapters.length;

  try {
    if (autosaveLog) autosaveLog.innerText = "Configuring document...";
    const chaptersCollection = collection(db, "chapters");
    const freshRef = await addDoc(chaptersCollection, {
      title: configuredTitle.trim(),
      text: "New Chapter Content",
      order: currentMaxOrdinal
    });

    selectedChapterId = freshRef.id;
    await loadChaptersFromFirestore();
    buildSidebarElements();
    selectChapter(selectedChapterId);
    if (autosaveLog) autosaveLog.innerText = "Chapter ready.";
  } catch (err) {
    alert("Failed to initialize item: " + err.message);
    if (autosaveLog) autosaveLog.innerText = "";
  }
};

saveBtn.onclick = async () => {
  if (!currentUser || !selectedChapterId) return;
  
  const updatedTitle = editTitleInput.value.trim();
  const updatedText = editTextWindow.value;

  if (!updatedTitle) {
    alert("Title cannot be left blank.");
    return;
  }

  try {
    const docRef = doc(db, "chapters", selectedChapterId);
    
    await updateDoc(docRef, {
      title: updatedTitle,
      text: updatedText
    });
    
    isEditing = false;
    stopAutosaveCycle();
    editMode.classList.add("hidden");
    viewMode.classList.remove("hidden");
    await loadChaptersFromFirestore();
    
  } catch (err) {
    alert("Permission Denied: Your account doesn't have write privileges. Rolling back changes...");
    
    isEditing = false;
    stopAutosaveCycle();
    editMode.classList.add("hidden");
    viewMode.classList.remove("hidden");
    await loadChaptersFromFirestore();
  }
};

indexBtn.onclick = () => {
  window.location.href = "/goodrepositoryname";
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  
  if (!user) {
    status.innerText = "Not logged in";
    authActionBtn.innerText = "Login";
    selectedChapterId = null;
    activeChapters = [];
    renderGuestMode();
  } else {
    status.innerText = "Logged in";
    authActionBtn.innerText = "Logout";
    renderAppMode();
  }
});
</script>

</body>
</html>
