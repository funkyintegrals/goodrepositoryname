<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Archive</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #241a3a, #0f0b18);
      font-family: monospace;
      color: white;
      overflow: hidden;
    }
    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 20, 0.65);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .modal {
      width: 340px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(14px);
      position: relative;
    }
    
    .close {
      position: absolute;
      top: 10px;
      right: 12px;
      cursor: pointer;
    }
    
    .app {
      width: 920px;
      height: 540px;
      margin: 60px auto;
      display: none;
      flex-direction: row;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      backdrop-filter: blur(18px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 220px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    
    .chapter {
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .chapter:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .chapter.active {
      background: rgba(255,255,255,0.12);
    }
    
    .content {
      flex: 1;
      padding: 18px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .title {
      font-size: 18px;
      margin-bottom: 10px;
      opacity: 0.9;
    }
    
    textarea {
      flex: 1;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px;
      color: white;
      outline: none;
      resize: none;
    }
    
    .readonly {
      flex: 1;
      white-space: pre-wrap;
    }
    
    .edit-btn {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    
    .hidden {
      display: none;
    }
    </style>
    </head>
    
    <body>
    
    <div class="overlay" id="overlay">
      <div class="modal">
        <div class="close" id="closeBtn">✕</div>
        <h3>Login</h3>
        <button id="loginBtn">Enter</button>
      </div>
    </div>
    
    <div class="app" id="app">
    
      <div class="sidebar" id="sidebar"></div>
    
      <div class="content">
        <div class="title" id="title">...</div>
    
        <div class="readonly" id="reader">No chapter selected</div>
    
        <textarea id="editor" class="hidden"></textarea>
    
        <button class="edit-btn hidden" id="editBtn">Edit</button>
      </div>
    
    </div>
    
    <script>
    let currentUser = null;
    let currentChapter = null;
    let activeChapterId = null;
    
    const chapters = [
      { id: "1", title: "Chapter I", text: "First text..." },
      { id: "2", title: "Chapter II", text: "Second text..." },
      { id: "3", title: "Chapter III", text: "Third text..." }
    ];
    
    const overlay = document.getElementById("overlay");
    const app = document.getElementById("app");
    const sidebar = document.getElementById("sidebar");
    
    const title = document.getElementById("title");
    const reader = document.getElementById("reader");
    const editor = document.getElementById("editor");
    const editBtn = document.getElementById("editBtn");
    
    const loginBtn = document.getElementById("loginBtn");
    const closeBtn = document.getElementById("closeBtn");
    
    function showDenied() {
      document.body.innerHTML = `
        <div style="
          display:flex;
          height:100vh;
          justify-content:center;
          align-items:center;
          background:#0f0b18;
          color:white;
          font-family:monospace;
          text-align:center;
          padding:20px;
        ">
          Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη.
        </div>
      `;
    }
    
    function unlockApp() {
      overlay.style.display = "none";
      app.style.display = "flex";
    
      renderChapters();
      openChapter(chapters[0]);
    }
    
    function renderChapters() {
      sidebar.innerHTML = "";
    
      chapters.forEach(ch => {
        const div = document.createElement("div");
        div.className = "chapter";
        div.innerText = ch.title;
    
        div.onclick = () => {
          setActive(ch.id);
          openChapter(ch);
        };
    
        sidebar.appendChild(div);
      });
    }
    
    function setActive(id) {
      activeChapterId = id;
    
      document.querySelectorAll(".chapter").forEach(el => {
        el.classList.remove("active");
      });
    
      const items = document.querySelectorAll(".chapter");
      const index = chapters.findIndex(c => c.id === id);
    
      if (items[index]) {
        items[index].classList.add("active");
      }
    }
    
    function openChapter(ch) {
      currentChapter = ch;
    
      reader.style.opacity = 0;
    
      setTimeout(() => {
        title.innerText = ch.title;
        reader.innerText = ch.text;
        reader.style.opacity = 1;
      }, 120);
    
      editor.classList.add("hidden");
      reader.classList.remove("hidden");
    
      editBtn.classList.add("hidden");
    }
    
    function enterEditMode() {
      editor.value = currentChapter.text;
    
      reader.classList.add("hidden");
      editor.classList.remove("hidden");
      editBtn.classList.remove("hidden");
    }
    
    loginBtn.onclick = () => {
      currentUser = "me";
      unlockApp();
    };
    
    closeBtn.onclick = () => {
      showDenied();
    };
    
    editBtn.onclick = () => {
      enterEditMode();
    };
    
    overlay.style.display = "flex";
  </script>

</body>
</html>
