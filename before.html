<!DOCTYPE html>
<html>
<head>
<title>Archive</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #241a3a, #0f0b18);
      font-family: monospace;
      color: rgba(255,255,255,0.9);
      overflow: hidden;
    }
    
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 20, 0.65);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .modal {
      width: 340px;
      padding: 18px;
      border-radius: 14px;
    
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    
      color: white;
      position: relative;
    }
    
    .close {
      position: absolute;
      top: 10px;
      right: 12px;
      cursor: pointer;
      opacity: 0.7;
    }
    
    .close:hover {
      opacity: 1;
    }
    
    .app {
      width: 920px;
      height: 540px;
      margin: 60px auto;
    
      display: none;
      flex-direction: row;
    
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
    
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 90px rgba(0,0,0,0.7);
    
      overflow: hidden;
    }
    
    .sidebar {
      width: 220px;
      padding: 12px;
    
      background: rgba(255,255,255,0.04);
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    
    .chapter {
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
    
      transition: 0.2s;
      background: transparent;
    }
    
    .chapter:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .content {
      flex: 1;
      padding: 18px;
      position: relative;
    
      display: flex;
      flex-direction: column;
    }
    
    .title {
      font-size: 18px;
      margin-bottom: 10px;
      opacity: 0.9;
    }
    
    textarea {
      flex: 1;
      width: 100%;
    
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    
      border-radius: 10px;
      padding: 10px;
    
      color: white;
      outline: none;
      resize: none;
    
      backdrop-filter: blur(10px);
    }
    
    .readonly {
      flex: 1;
      white-space: pre-wrap;
    
      padding: 10px;
      opacity: 0.9;
    }
    
    .edit-btn {
      position: absolute;
      bottom: 14px;
      right: 14px;
    
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
    
      cursor: pointer;
    
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }
    
    .edit-btn:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>

</head>

<body>
  <script>
    const overlay = document.getElementById("overlay");
    const app = document.getElementById("app");
    
    const closeBtn = document.getElementById("closeBtn");
    const loginBtn = document.getElementById("loginBtn");
    
    const reader = document.getElementById("reader");
    const editor = document.getElementById("editor");
    const editBtn = document.getElementById("editBtn");
    const title = document.getElementById("title");
    const overlay = document.getElementById("overlay");
    const chapters = [
      { id: "1", title: "Chapter I", text: "..." },
      { id: "2", title: "Chapter II", text: "..." },
      { id: "3", title: "Chapter III", text: "..." }
    ];

    let state = "locked"; 
    
    function showOverlay() {
      overlay.style.display = "flex";
      app.style.display = "none";
    }
    
    function showDenied() {
      overlay.style.display = "none";
      app.style.display = "none";
      document.body.innerHTML = `
        <div style="display:flex;height:100vh;justify-content:center;align-items:center;background:#393057;color:white;font-family:monospace;">
          Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη.
        </div>
      `;
    }
    
    function unlockApp() {
      overlay.style.display = "none";
      app.style.display = "flex";
    
      title.innerText = "...";
      reader.innerText = "...";
      editor.style.display = "none";
      editBtn.style.display = "none";
      reader.style.display = "block";
    
      state = "unlocked";
    }
    
    function renderChapters() {
      const sidebar = document.getElementById("sidebar");
      sidebar.innerHTML = "";
    
      chapters.forEach(ch => {
        const div = document.createElement("div");
        div.className = "chapter";
        div.innerText = ch.title;
    
        div.onclick = () => openChapter(ch);
    
        sidebar.appendChild(div);
      });
    }
    
    function openChapter(ch) {
      document.getElementById("title").innerText = ch.title;
      document.getElementById("reader").innerText = ch.text;
    }
    
    
    loginBtn.onclick = () => {
      unlockApp(); // fake login for now
    };
    
    closeBtn.onclick = () => {
      showDenied();
    };
    
    showOverlay();
    

    renderChapters();
    openChapter(chapters[0]); // default view
    
































    
  </script>
</body>
</html>
