<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Archive</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #241a3a, #0f0b18);
  font-family: monospace;
  color: white;
  overflow: hidden;
}

.topbar {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;
}

.topbar button {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.app {
  width: 920px;
  height: 540px;
  margin: 60px auto;
  display: flex;
  flex-direction: row;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  backdrop-filter: blur(18px);
  overflow: hidden;
}

.sidebar {
  width: 220px;
  padding: 12px;
  background: rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.08);
}

.chapter {
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.chapter:hover {
  background: rgba(255,255,255,0.08);
}

.content {
  flex: 1;
  padding: 18px;
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

textarea {
  flex: 1;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px;
  color: white;
  outline: none;
  resize: none;
}

.readonly {
  flex: 1;
  white-space: pre-wrap;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="loginBtn">Login</button>
</div>

<div class="app">
  <div class="sidebar" id="sidebar"></div>

  <div class="content">
    <div class="title" id="title">...</div>
    <div class="readonly" id="reader">...</div>
    <textarea id="editor" class="hidden"></textarea>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  doc,
  getDocs,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAYxM0lgqwhy3cGjUyCqezNrZGXlt9k4VQ",
  authDomain: "before-funkyintegrals.firebaseapp.com",
  projectId: "before-funkyintegrals",
  storageBucket: "before-funkyintegrals.firebasestorage.app",
  messagingSenderId: "417148050533",
  appId: "1:417148050533:web:c6e8b7c0de0495a7ea3a8c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");

const sidebar = document.getElementById("sidebar");
const title = document.getElementById("title");
const reader = document.getElementById("reader");
const editor = document.getElementById("editor");

let currentUser = null;
let currentId = null;

const fallback = {
  id: "locked",
  title: "...",
  text: "Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη."
};

loginBtn.onclick = () => signInWithPopup(auth, provider);

onAuthStateChanged(auth, user => {
  currentUser = user;
  loadChapters();
});

async function loadChapters() {
  sidebar.innerHTML = "";

  if (!currentUser) {
    renderLocked();
    return;
  }

  const snap = await getDocs(collection(db, "chapters"));

  snap.forEach(d => {
    const div = document.createElement("div");
    div.className = "chapter";
    div.innerText = d.data().title;
    div.onclick = () => openChapter(d.id);
    sidebar.appendChild(div);
  });
}

function renderLocked() {
  sidebar.innerHTML = "";

  const div = document.createElement("div");
  div.className = "chapter";
  div.innerText = fallback.title;

  div.onclick = () => {
    title.innerText = fallback.title;
    reader.innerText = fallback.text;
    reader.classList.remove("hidden");
    editor.classList.add("hidden");
  };

  sidebar.appendChild(div);

  title.innerText = fallback.title;
  reader.innerText = fallback.text;
}

async function openChapter(id) {
  currentId = id;

  const snap = await getDoc(doc(db, "chapters", id));
  const data = snap.data();

  title.innerText = data.title;
  reader.innerText = data.text;
}

</script>

</body>
</html>
