<!DOCTYPE html>
<html>
<head>
<title>Archive</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: #393057;
  font-family: monospace;
  color: white;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  justify-content: center;
  align-items: center;
}


.modal {
  width: 320px;
  background: white;
  color: black;
  border-radius: 10px;
  padding: 16px;
  position: relative;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.close {
  position: absolute;
  top: 8px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
}


.app {
  width: 920px;
  height: 540px;
  margin: 60px auto;
  background: #2f2550;
  border-radius: 14px;
  display: flex;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}


.sidebar {
  width: 220px;
  background: #241d44;
  padding: 12px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.05);
}


.chapter {
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
}

.chapter:hover {
  background: rgba(255,255,255,0.08);
}


.content {
  flex: 1;
  padding: 18px;
  position: relative;
  display: flex;
  flex-direction: column;
}


.title {
  font-size: 18px;
  margin-bottom: 10px;
  opacity: 0.9;
}


textarea {
  flex: 1;
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
}


.readonly {
  flex: 1;
  white-space: pre-wrap;
  overflow-y: auto;
  opacity: 0.95;
}


.edit-btn {
  position: absolute;
  bottom: 14px;
  right: 14px;
  background: #ffffff22;
  border: none;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.edit-btn:hover {
  background: #ffffff33;
}


.denied {
  text-align: center;
  font-size: 16px;
  opacity: 0.9;
}
</style>

</head>

<body>
  <div>Hello</div>
</body>
</html>
