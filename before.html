<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Archive</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #241a3a, #0f0b18);
  font-family: monospace;
  color: white;
  overflow: hidden;
}

.topbar {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 9999;
  display: flex;
  gap: 8px;
}

.topbar input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  padding: 6px;
  border-radius: 8px;
  outline: none;
}

.topbar button {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.app {
  width: 920px;
  height: 540px;
  margin: 60px auto;
  display: flex;
  flex-direction: row;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  backdrop-filter: blur(18px);
  overflow: hidden;
}

.sidebar {
  width: 220px;
  padding: 12px;
  background: rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,255,255,0.08);
}

.chapter {
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.chapter:hover {
  background: rgba(255,255,255,0.08);
}

.content {
  flex: 1;
  padding: 18px;
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

textarea {
  flex: 1;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px;
  color: white;
  outline: none;
  resize: none;
}

.readonly {
  flex: 1;
  white-space: pre-wrap;
}

.hidden {
  display: none;
}

#deny {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: #0f0b18;
  font-family: monospace;
  color: white;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button id="loginBtn" type="button">Login</button>
</div>

<div id="deny">Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη.</div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar"></div>

  <div class="content">
    <div class="title" id="title">...</div>
    <div class="readonly" id="reader">...</div>
    <textarea id="editor" class="hidden"></textarea>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  doc,
  getDocs,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");

const appUI = document.getElementById("app");
const deny = document.getElementById("deny");

const sidebar = document.getElementById("sidebar");
const title = document.getElementById("title");
const reader = document.getElementById("reader");

const fallback = {
  title: "...",
  text: "Ἡ ἱερὰ οὐράνιος βίβλος οὔπω σοι ἀνεῴχθη."
};

let currentUser = null;

loginBtn.onclick = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

onAuthStateChanged(auth, user => {
  currentUser = user;

  if (!user) {
    appUI.style.display = "flex";
    deny.style.display = "flex";
    loadFallback();
    return;
  }

  deny.style.display = "none";
  appUI.style.display = "flex";
  loadChapters();
});

function loadFallback() {
  sidebar.innerHTML = "";

  const div = document.createElement("div");
  div.className = "chapter";
  div.innerText = fallback.title;

  div.onclick = () => {
    title.innerText = fallback.title;
    reader.innerText = fallback.text;
  };

  sidebar.appendChild(div);

  title.innerText = fallback.title;
  reader.innerText = fallback.text;
}

async function loadChapters() {
  sidebar.innerHTML = "";

  const snap = await getDocs(collection(db, "chapters"));

  snap.forEach(d => {
    const div = document.createElement("div");
    div.className = "chapter";
    div.innerText = d.data().title;

    div.onclick = async () => {
      const docSnap = await getDoc(doc(db, "chapters", d.id));
      const data = docSnap.data();

      title.innerText = data.title;
      reader.innerText = data.text;
    };

    sidebar.appendChild(div);
  });
}

</script>

</body>
</html>
